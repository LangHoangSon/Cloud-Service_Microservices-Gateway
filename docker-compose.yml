version: "3"

services:
  gateway:
    build: ./gateway
    ports:
      - "8000:8000"
    depends_on:
      - auth
      - product
      - order

  auth:
    build: ./services/auth_service
    ports:
      - "8001:8000"

  product:
    build: ./services/product_service
    ports:
      - "8002:8000"

  # order:
  #   build: ./services/order_service
  #   ports:
  #     - "8003:8000"

  order:
  build: ./services/order_service
  ports:
    - "8003:8000"
  volumes:
    - ./services/order_service:/app